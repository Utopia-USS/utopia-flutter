name: utopia_utils
description: Foundational Dart utilities for the Utopia ecosystem - Kotlin-style scope extensions (let/also/run), a Value/MutableValue abstraction and a Retryable wrapper.
topics:
  - utils
  - extensions
  - dart
  - functional
  - flutter
version: 0.3.3
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  intl: ">= 0.17.0 <1.0.0"
  meta: ^1.10.0

dev_dependencies:
  utopia_lints: ^0.0.5