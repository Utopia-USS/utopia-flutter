name: utopia_rest
description: Dio interceptors and shared config for REST APIs - standard BaseOptions preset, token-injection auth interceptor and reporter-backed request logging.
topics:
  - rest
  - http
  - dio
  - networking
  - api
version: 0.1.0+5
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  utopia_utils: ^0.3.3
  utopia_reporter: ^0.1.0+5
  dio: ^5.0.0

dev_dependencies:
  utopia_lints: ^0.0.5