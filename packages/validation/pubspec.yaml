name: utopia_validation
description: Lightweight form validation primitives for Flutter - composable Validator and AsyncValidator types with localizable errors, built for useFieldState in utopia_hooks.
topics:
  - validation
  - forms
  - flutter
  - hooks
  - input
version: 0.1.0+4
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  utopia_utils: ^0.3.3

dev_dependencies:
  utopia_lints: ^0.0.5
