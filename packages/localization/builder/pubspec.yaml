name: utopia_localization_builder
description: Internal build_runner builder for utopia_localization_generator - powers Google Sheets-based i18n/l10n localization code generation in Flutter.
topics:
  - localization
  - i18n
  - l10n
  - codegen
  - build-runner
homepage: https://github.com/Utopia-USS/utopia-flutter
version: 0.0.5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  utopia_localization_template: ^0.0.3

  recase: ^4.0.0
  yaml: ^3.1.0
  equatable: ^2.0.0
  collection: ^1.15.0
  dart_style: ^3.0.1
