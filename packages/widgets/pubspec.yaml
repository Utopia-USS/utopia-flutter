name: utopia_widgets
description: A collection of small, generic Flutter widgets - form and scroll layouts, CrossFadeIndexedStack, collapsibles, unfocus-on-tap and other reusable UI parts.
topics:
  - widgets
  - flutter
  - ui
  - layout
  - components
version: 0.1.2+1
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  utopia_utils: ^0.3.3

dev_dependencies:
  utopia_lints: ^0.0.5