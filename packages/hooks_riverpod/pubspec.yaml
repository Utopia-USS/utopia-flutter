name: utopia_hooks_riverpod
description: Riverpod interoperability for utopia_hooks - consume and watch Riverpod providers inside hook-based Flutter screens via HookConsumerWidget.
topics:
  - hooks
  - riverpod
  - state-management
  - flutter
  - dependency-injection
version: 0.1.0+8
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  utopia_hooks: ^0.4.25

  flutter_riverpod: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  utopia_lints: ^0.0.5
