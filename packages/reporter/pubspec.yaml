name: utopia_reporter
description: Lightweight reporting and error-logging abstraction for Dart and Flutter - define one Reporter and swap logging or crash-reporting backends freely.
topics:
  - logging
  - error-handling
  - crash-reporting
  - flutter
  - dart
version: 0.1.0+5
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  utopia_utils: ^0.3.3
  logger: ^2.2.0

dev_dependencies:
  utopia_lints: ^0.0.5