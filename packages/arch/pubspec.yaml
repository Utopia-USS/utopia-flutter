name: utopia_arch
description: All-in-one architecture bundle for Flutter apps - utopia_hooks, widgets, dependency injection, validation, reporting and collections in one dependency.
topics:
  - architecture
  - flutter
  - state-management
  - hooks
  - dependency-injection
version: 0.5.1+28
homepage: https://github.com/Utopia-USS/utopia-flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  utopia_utils: ^0.3.3
  utopia_hooks: ^0.4.25
  utopia_reporter: ^0.1.0+5
  utopia_collections: ^0.1.2
  utopia_validation: ^0.1.0+4
  utopia_widgets: ^0.1.2+1
  utopia_injector: ^0.1.0

  page_transition: ^2.0.2
  shared_preferences: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  utopia_lints: ^0.0.5
